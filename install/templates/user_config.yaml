version: <|PLACEHOLD_1|>
shell_proxy_default: 'ON'  ##  ON  / OFF
subscribes:
  your_proxy_name: "<you_proxy_url>"
# 默认使用订阅，你可以填subscribe_urls中的任意名字,DEFAULT 是指使用 subscribe_urls 中的第一个
default_subscribe: "DEFAULT"

################### lan share ###############
# Master-Master 共享模式：
# - enabled: 是否启用局域网发现（默认 true）
# - offer_config: 是否允许他机用 PIN 拉取本机 config（默认 true）
share:
  enabled: true
  offer_config: true

################### custom rule ############
## you need "myclash service update_cfg" after change custom rule
port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
direct-rule:
  - DOMAIN-SUFFIX,miwifi.com
  - IP-CIDR,192.168.1.0/24
# custom-rule-<your_proxy_name>:
#   use_node: "🚀 选择节点"
#   domain:
#     # example
#     - DOMAIN-SUFFIX,miwifi.com
#     - IP-CIDR,192.168.1.0/24
############################################