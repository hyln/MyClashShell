version: <|PLACEHOLD_1|>
shell_proxy_default: 'ON'  ##  ON  / OFF
subscribes:
  your_proxy_name:
    url: "<you_proxy_url>"
    backend: clash
# 默认使用订阅：可填 subscribes 中任意名字；DEFAULT 表示使用 YAML 中第一个订阅
default_subscribe: "DEFAULT"

# 仅 v2ray 后端且订阅含多个节点时：填某 outbound 的 tag 则固定走该节点；留空则随机 balancer。
# 也可用：myclash v2ray ui（图形里选节点、测速、固定/取消固定）
# v2ray_outbound_tag: ""

# mcs_manager 本地控制 HTTP（GET /kernel/status、reload_kernel 等）；修改后需重启 mcs 服务
mcs_api_host: 127.0.0.1
# 端口池（含端点）；在池内选首个空闲端口，实际端口写入 cache/current_mcs_port.txt
mcs_api_start_port: 29190
mcs_api_end_port: 29200

# 订阅合并后，用该文件的 rules 整段替换提供商自带 rules（保留订阅里的 proxies / proxy-groups）。
# 路径相对 MYCLASH_ROOT；删除本项或留空则不替换。
rules_template: install/templates/rules.yaml

# 合并后仅用 Via-Proxy（全部节点 + DIRECT），替换订阅自带 proxy-groups；与 rules 中 Via-Proxy / DIRECT 搭配
slim_proxy_groups: true

################### clash / mihomo 监听与 API（合并订阅时从本文件顶层覆盖订阅同名字段）############
## 修改后需重新合并配置：myclash service update_subcribe
port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
############################################
